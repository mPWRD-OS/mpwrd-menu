name: Publish APT Repository

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      suite:
        description: Suite to publish
        required: true
        default: testing
        type: choice
        options:
          - testing
          - stable
      version:
        description: Override Debian package version
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build and repo dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            apt-utils \
            build-essential \
            debhelper \
            devscripts \
            dpkg-dev \
            fakeroot \
            gnupg \
            python3

      - name: Derive publish settings
        id: publish
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_SUITE: ${{ inputs.suite }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "release" ]]; then
            suite="stable"
            version="${RELEASE_TAG#v}"
          elif [[ -n "${INPUT_SUITE}" ]]; then
            suite="${INPUT_SUITE}"
            version="${INPUT_VERSION}"
          else
            suite="testing"
            base_version="$(dpkg-parsechangelog -S Version)"
            timestamp="$(date -u +%Y%m%d%H%M%S)"
            short_sha="${GITHUB_SHA::7}"
            version="${base_version}+git${timestamp}.${short_sha}"
          fi

          if [[ -z "${version}" ]]; then
            base_version="$(dpkg-parsechangelog -S Version)"
            timestamp="$(date -u +%Y%m%d%H%M%S)"
            short_sha="${GITHUB_SHA::7}"
            version="${base_version}+git${timestamp}.${short_sha}"
          fi

          echo "suite=${suite}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build package
        env:
          MPWRD_MENU_DEB_VERSION: ${{ steps.publish.outputs.version }}
        run: ./packaging/build-deb.sh

      - name: Import signing key
        env:
          MPWRD_APT_SIGNING_PRIVATE_KEY: ${{ secrets.MPWRD_APT_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          export GNUPGHOME="${RUNNER_TEMP}/gnupg"
          mkdir -p "${GNUPGHOME}"
          chmod 700 "${GNUPGHOME}"
          printf '%s' "${MPWRD_APT_SIGNING_PRIVATE_KEY}" | gpg --batch --import
          fingerprint="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^fpr:/ { print $10; exit }')"
          echo "GNUPGHOME=${GNUPGHOME}" >> "${GITHUB_ENV}"
          echo "GPG_SIGNING_KEY_ID=${fingerprint}" >> "${GITHUB_ENV}"

      - name: Prepare gh-pages checkout
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          remote_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote --exit-code --heads "${remote_url}" gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "${remote_url}" pages
          else
            mkdir pages
            git -C pages init
            git -C pages checkout -b gh-pages
            git -C pages remote add origin "${remote_url}"
          fi

      - name: Update suite repository
        env:
          GPG_PASSPHRASE: ${{ secrets.MPWRD_APT_SIGNING_PASSPHRASE }}
          GPG_SIGNING_KEY_ID: ${{ env.GPG_SIGNING_KEY_ID }}
        run: |
          set -euo pipefail
          rm -rf "pages/dists/${{ steps.publish.outputs.suite }}" "pages/pool/${{ steps.publish.outputs.suite }}"
          cp packaging/pages/index.html pages/index.html
          ./packaging/build-apt-repo.sh \
            "${{ steps.publish.outputs.suite }}" \
            pages \
            mpwrd-archive-keyring.gpg \
            dist/*.deb

      - name: Commit and push gh-pages
        env:
          SUITE: ${{ steps.publish.outputs.suite }}
          VERSION: ${{ steps.publish.outputs.version }}
        run: |
          set -euo pipefail
          git -C pages config user.name "github-actions[bot]"
          git -C pages config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C pages add .
          if git -C pages diff --cached --quiet; then
            exit 0
          fi
          git -C pages commit -m "Publish ${SUITE} repo for ${VERSION}"
          git -C pages push origin gh-pages

      - name: Upload release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "${RELEASE_TAG}" dist/* --clobber
