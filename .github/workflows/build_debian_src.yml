name: Build Debian Source Package

on:
  workflow_call:
    inputs:
      checkout_ref:
        required: false
        type: string
      release_message:
        required: false
        type: string
      release_version:
        required: false
        type: string
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-debian-src:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: mpwrd-menu
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: Install deps
        shell: bash
        working-directory: mpwrd-menu
        run: |
          sudo apt-get update -y --fix-missing
          sudo apt-get install -y software-properties-common build-essential devscripts equivs
          sudo mk-build-deps --install --remove --tool='apt-get -o Debug::pkgProblemResolver=yes --no-install-recommends --yes' debian/control

      - name: Prepare release changelog
        if: inputs.release_version != '' && inputs.release_message != ''
        shell: bash
        working-directory: mpwrd-menu
        env:
          RELEASE_MESSAGE: ${{ inputs.release_message }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          dch -M -v "${RELEASE_VERSION}" "${RELEASE_MESSAGE}"
          dch -M --release --distribution unstable ""

      - name: Show release changelog
        if: inputs.release_version != '' && inputs.release_message != ''
        working-directory: mpwrd-menu
        run: sed -n '1,8p' debian/changelog

      - name: Package debian source
        working-directory: mpwrd-menu
        run: debuild -S -nc -us -uc

      - name: Store binaries as an artifact
        uses: actions/upload-artifact@v7
        with:
          name: mpwrd-menu-src
          overwrite: true
          path: |
            mpwrd-menu_*
