name: Build Debian Source Package

on:
  workflow_call:
  push:
    branches:
      - developer
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-debian-src:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          path: mpwrd-menu

      - name: Install deps
        shell: bash
        working-directory: mpwrd-menu
        run: |
          sudo apt-get update -y --fix-missing
          sudo apt-get install -y software-properties-common build-essential devscripts equivs
          sudo mk-build-deps --install --remove --tool='apt-get -o Debug::pkgProblemResolver=yes --no-install-recommends --yes' debian/control

      - name: Package debian source
        if: github.event_name == 'workflow_call'
        working-directory: mpwrd-menu
        run: debuild -S -nc -us -uc

      - name: Upload source package artifact
        if: github.event_name == 'workflow_call'
        uses: actions/upload-artifact@v7
        with:
          name: mpwrd-menu-src
          overwrite: true
          path: |
            mpwrd-menu_*.dsc
            mpwrd-menu_*.debian.tar.xz
            mpwrd-menu_*.tar.xz
            mpwrd-menu_*.changes

      - name: Package binary deb
        if: github.event_name != 'workflow_call'
        working-directory: mpwrd-menu
        run: debuild -b -nc -us -uc

      - name: Upload binary deb artifact
        if: github.event_name != 'workflow_call'
        uses: actions/upload-artifact@v7
        with:
          name: mpwrd-menu-deb
          overwrite: true
          path: |
            mpwrd-menu_*.deb
            mpwrd-menu_*.buildinfo
            mpwrd-menu_*.changes
